[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
timeout = 60
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    smoke: quick smoke tests
    e2e: full end-to-end tests
addopts = -v --tb=short --strict-markers
cache_dir = ../.pytest_cache

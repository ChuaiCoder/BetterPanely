<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <style>
      :root {
        color-scheme: dark;
        --page-bg: #1a1a2e;
        --titlebar-bg: #0f0f23;
        --section-bg: #1f2b47;
        --field-bg: #0f0f23;
        --border: #2a3a5c;
        --text: #e0e0e0;
        --text-muted: #888;
        --text-subtle: #666;
        --accent: #6c63ff;
        --accent-hover: #5a52d5;
        --success: #2ecc71;
        --danger: #e74c3c;
      }
      :root[data-theme="light"] {
        color-scheme: light;
        --page-bg: #f7f9fc;
        --titlebar-bg: #e8edf7;
        --section-bg: #ffffff;
        --field-bg: #f1f5fb;
        --border: #cad4e5;
        --text: #172033;
        --text-muted: #546179;
        --text-subtle: #748197;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --success: #15803d;
        --danger: #dc2626;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--page-bg); color: var(--text);
        height: 100vh; display: flex; flex-direction: column;
        overflow: hidden;
      }
      .titlebar {
        height: 32px; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        background: var(--titlebar-bg); cursor: grab;
        font-size: 12px; color: var(--text-muted); letter-spacing: 1px;
        border-bottom: 1px solid var(--border);
      }
      .titlebar:active { cursor: grabbing; }
      .container { flex: 1; overflow-y: auto; max-width: 400px; margin: 0 auto; padding: 16px 24px; }
      h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; color: var(--accent); }
      .section {
        background: var(--section-bg); border: 1px solid var(--border);
        border-radius: 8px; padding: 16px; margin-bottom: 12px;
      }
      .section h2 { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
      .row {
        display: flex; justify-content: space-between; align-items: center;
        padding: 8px 0;
      }
      .row label { font-size: 14px; }
      .row .hint { font-size: 11px; color: var(--text-subtle); margin-top: 2px; }
      select, button {
        padding: 6px 12px; font-size: 13px; background: var(--field-bg);
        border: 1px solid var(--border); border-radius: 6px; color: var(--text);
        font-family: inherit; cursor: pointer;
      }
      select:focus { outline: none; border-color: var(--accent); }
      button { background: var(--accent); border-color: var(--accent); color: white; }
      button:hover { background: var(--accent-hover); }
      button.danger { background: var(--danger); border-color: var(--danger); }
      .toggle {
        position: relative; width: 44px; height: 24px; cursor: pointer;
      }
      .toggle input { opacity: 0; width: 0; height: 0; }
      .toggle .slider {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background: var(--border); border-radius: 24px; transition: 0.2s;
      }
      .toggle .slider:before {
        content: ""; position: absolute; height: 18px; width: 18px;
        left: 3px; bottom: 3px; background: white; border-radius: 50%;
        transition: 0.2s;
      }
      .toggle input:checked + .slider { background: var(--accent); }
      .toggle input:checked + .slider:before { transform: translateX(20px); }
      .status { font-size: 12px; color: var(--success); margin-top: 16px; text-align: center; }
      .status.error { color: var(--danger); }
    </style>
  </head>
  <body>
    <div class="titlebar" data-tauri-drag-region>
      <span id="titlebarText">Settings</span>
    </div>
    <div class="container">
      <h1 id="title">Settings</h1>

      <div class="section">
        <h2 id="lblLanguage">Language</h2>
        <div class="row">
          <label id="lblLangSelect">Display Language</label>
          <select id="langSelect">
            <option value="en">English</option>
            <option value="zh">中文</option>
          </select>
        </div>
      </div>

      <div class="section">
        <h2 id="lblAppearance">Appearance</h2>
        <div class="row">
          <label id="lblTheme">Theme</label>
          <select id="themeSelect">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="system">System</option>
          </select>
        </div>
      </div>

      <div class="section">
        <h2 id="lblBehavior">Behavior</h2>
        <div class="row">
          <div>
            <label id="lblStartup">Launch on Startup</label>
            <div class="hint" id="hintStartup">Start BetterPanely when Windows starts</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="launchStartup">
            <span class="slider"></span>
          </label>
        </div>
        <div class="row">
          <div>
            <label id="lblMinimize">Minimize to Tray</label>
            <div class="hint" id="hintMinimize">Hide to system tray instead of closing</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="minimizeTray" checked>
            <span class="slider"></span>
          </label>
        </div>
        <div class="row">
          <div>
            <label id="lblHotkey">Capture Hotkey</label>
            <div class="hint" id="hintHotkey">Keyboard shortcut to capture a window</div>
          </div>
          <span style="font-family:monospace;font-size:13px;color:var(--accent);" id="hotkeyDisplay">Ctrl+Shift+W</span>
        </div>
      </div>

      <button id="saveBtn" style="width:100%;padding:12px;font-size:14px;margin-top:12px;">Save Settings</button>
      <div class="status" id="statusBar"></div>
    </div>

    <script>
      var currentSettings = {
        language: getLang(),
        theme: "dark",
        launchOnStartup: false,
        minimizeToTray: true,
        captureHotkey: "Ctrl+Shift+W"
      };

      function tauriInvoke(command, args) {
        var tauri = window.__TAURI__;
        var core = tauri && (tauri.core || tauri);
        if (!core || !core.invoke) {
          return Promise.reject("Tauri API is unavailable");
        }
        return core.invoke(command, args);
      }

      function tauriListen(eventName, callback) {
        var eventApi = window.__TAURI__ && window.__TAURI__.event;
        if (!eventApi || !eventApi.listen) return;
        eventApi.listen(eventName, callback);
      }

      // ─── i18n ──────────────────────────────────────────
      var LOCALE = {
        en: {
          title: "Settings", language: "Language", langSelect: "Display Language",
          appearance: "Appearance", theme: "Theme",
          behavior: "Behavior", launchStartup: "Launch on Startup",
          hintStartup: "Start BetterPanely when Windows starts",
          minimizeTray: "Minimize to Tray", hintMinimize: "Hide to system tray instead of closing",
          captureHotkey: "Capture Hotkey", hintHotkey: "Keyboard shortcut to capture a window",
          save: "Save Settings", saved: "Settings saved", error: "Error saving settings"
        },
        zh: {
          title: "设置", language: "语言", langSelect: "显示语言",
          appearance: "外观", theme: "主题",
          behavior: "行为", launchStartup: "开机启动",
          hintStartup: "Windows 启动时自动运行 BetterPanely",
          minimizeTray: "最小化到托盘", hintMinimize: "关闭时隐藏到系统托盘而不是退出",
          captureHotkey: "捕获热键", hintHotkey: "捕获窗口的键盘快捷键",
          save: "保存设置", saved: "设置已保存", error: "保存设置失败"
        }
      };
      function getLang() {
        var m = location.hash.match(/lang=([^&]+)/);
        return (m && m[1] === "zh") ? "zh" : "en";
      }
      function t(key) { return (LOCALE[getLang()] || LOCALE.en)[key] || key; }
      function applyLang() {
        document.title = t("title");
        document.getElementById("titlebarText").textContent = t("title");
        document.getElementById("title").textContent = t("title");
        document.getElementById("lblLanguage").textContent = t("language");
        document.getElementById("lblLangSelect").textContent = t("langSelect");
        document.getElementById("lblAppearance").textContent = t("appearance");
        document.getElementById("lblTheme").textContent = t("theme");
        document.getElementById("lblBehavior").textContent = t("behavior");
        document.getElementById("lblStartup").textContent = t("launchStartup");
        document.getElementById("hintStartup").textContent = t("hintStartup");
        document.getElementById("lblMinimize").textContent = t("minimizeTray");
        document.getElementById("hintMinimize").textContent = t("hintMinimize");
        document.getElementById("lblHotkey").textContent = t("captureHotkey");
        document.getElementById("hintHotkey").textContent = t("hintHotkey");
        document.getElementById("saveBtn").textContent = t("save");
      }
      applyLang();
      applyTheme(currentSettings.theme);

      function resolveTheme(theme) {
        if (theme === "system") {
          return window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        return theme === "light" ? "light" : "dark";
      }

      function applyTheme(theme) {
        document.documentElement.dataset.themePreference = theme;
        document.documentElement.dataset.theme = resolveTheme(theme);
      }

      if (window.matchMedia) {
        window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", function() {
          if (currentSettings.theme === "system") applyTheme(currentSettings.theme);
        });
      }

      function setStatus(message, isError) {
        var statusBar = document.getElementById("statusBar");
        statusBar.textContent = message;
        statusBar.className = isError ? "status error" : "status";
      }

      function applySettings(settings) {
        currentSettings = settings;
        location.hash = "lang=" + settings.language;
        document.getElementById("langSelect").value = settings.language;
        document.getElementById("themeSelect").value = settings.theme;
        document.getElementById("launchStartup").checked = settings.launchOnStartup;
        document.getElementById("minimizeTray").checked = settings.minimizeToTray;
        document.getElementById("hotkeyDisplay").textContent = settings.captureHotkey;
        applyLang();
        applyTheme(settings.theme);
      }

      // ─── Load settings ────────────────────────────────
      function loadSettings() {
        if (window.__TAURI__) {
          tauriInvoke("get_settings").then(function(s) {
            applySettings(s);
          }).catch(function(e) {
            console.error("Failed to load settings:", e);
          });
        }
      }

      // ─── Save settings ────────────────────────────────
      document.getElementById("saveBtn").addEventListener("click", function() {
        var settings = {
          language: document.getElementById("langSelect").value,
          theme: document.getElementById("themeSelect").value,
          launchOnStartup: document.getElementById("launchStartup").checked,
          minimizeToTray: document.getElementById("minimizeTray").checked,
          captureHotkey: currentSettings.captureHotkey || document.getElementById("hotkeyDisplay").textContent
        };

        if (window.__TAURI__) {
          tauriInvoke("set_settings", { settings: settings }).then(function(saved) {
            applySettings(saved);
            setStatus(t("saved"), false);
            setTimeout(function() { setStatus("", false); }, 2000);
          }).catch(function(e) {
            setStatus(t("error") + ": " + e, true);
          });
        }
      });

      // Listen for language changes
      if (window.__TAURI__) {
        tauriListen("language-changed", function(evt) {
          location.hash = "lang=" + evt.payload;
          currentSettings.language = evt.payload;
          document.getElementById("langSelect").value = evt.payload;
          applyLang();
        });
        tauriListen("settings-changed", function(evt) {
          applySettings(evt.payload);
        });
      }

      loadSettings();
    </script>
  </body>
</html>
